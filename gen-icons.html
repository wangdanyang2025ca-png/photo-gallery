<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Generate Icons</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  // Background
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#1a1a1a');
  grad.addColorStop(1, '#0f0f0f');
  ctx.fillStyle = grad;
  ctx.roundRect(0, 0, s, s, s * 0.2);
  ctx.fill();
  // Diamond symbol ◈
  ctx.fillStyle = '#e8c87a';
  ctx.font = `bold ${s * 0.55}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('◈', s / 2, s / 2);
  return canvas.toDataURL('image/png');
}

const a192 = document.createElement('a');
a192.href = drawIcon(document.getElementById('c192'));
a192.download = 'icon-192.png';
a192.textContent = 'Download 192px';
document.body.appendChild(a192);

const a512 = document.createElement('a');
a512.href = drawIcon(document.getElementById('c512'));
a512.download = 'icon-512.png';
a512.textContent = ' | Download 512px';
document.body.appendChild(a512);
</script>
</body>
</html>
